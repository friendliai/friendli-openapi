          anyOf:
            - type: string
            - type: 'null'
          title: Text
          description: The transcribed text.
        usage:
          anyOf:
            - $ref: '#/components/schemas/AudioTranscriptionUsage'
            - type: 'null'
      type: object
      required:
        - type
      title: StreamedAudioTranscriptionData
    StreamedAudioTranscriptionResult:
      properties:
        data:
          $ref: '#/components/schemas/StreamedAudioTranscriptionData'
      type: object
      required:
        - data
      title: StreamedAudioTranscriptionResult
    StreamedChatChoice:
      properties:
        index:
          type: integer
          title: Index
          description: The index of the choice in the list of generated choices.
          examples:
            - 0
        logprobs:
          anyOf:
            - $ref: '#/components/schemas/ChatLogprobs'
            - type: 'null'
        delta:
          $ref: '#/components/schemas/StreamedChatChoiceDelta'
        finish_reason:
          anyOf:
            - type: string
              enum:
                - stop
                - length
                - tool_calls
                - 'null'
            - type: 'null'
          title: Finish Reason
          description: 'Termination condition of the generation. `stop` means the
            API returned the full chat completions generated by the model without
            running into any limits.

            `length` means the generation exceeded `max_tokens` or the conversation
            exceeded the max context length.

            `tool_calls` means the API has generated tool calls.'
      type: object
      required:
        - index
        - delta
      title: StreamedChatChoice
    StreamedChatChoiceDelta:
      properties:
        content:
          anyOf:
            - type: string
            - type: 'null'
          title: Content
          description: The contents of the assistant message.
        role:
          anyOf:
            - type: string
            - type: 'null'
          title: Role
          description: Role of the generated message author, in this case `assistant`.
        tool_calls:
          anyOf:
            - items:
                $ref: '#/components/schemas/StreamedToolCallResult'
              type: array
            - type: 'null'
          title: Tool Calls
      type: object
      title: StreamedChatChoiceDelta
    StreamedChatData:
      properties:
        id:
          type: string
          title: Id
          description: A unique ID of the chat completion.
        usage:
          anyOf:
            - $ref: '#/components/schemas/ChatUsage'
            - type: 'null'
        object:
          type: string
          const: chat.completion.chunk
          title: Object
          description: The object type, which is always set to `chat.completion.chunk`.
        choices:
          items:
            $ref: '#/components/schemas/StreamedChatChoice'
          type: array
          title: Choices
        created:
          type: integer
          title: Created
          description: The Unix timestamp (in seconds) for when the token is sampled.
        model:
          anyOf:
            - type: string
            - type: 'null'
          title: Model
          description: The model to generate the completion. For dedicated endpoints,
            it returns the endpoint ID.
      type: object
      required:
        - id
        - object
        - choices
        - created
      title: StreamedChatData
    StreamedChatResult:
      properties:
        data:
          $ref: '#/components/schemas/StreamedChatData'
      type: object
      required:
        - data
      title: StreamedChatResult
    StreamedCompletionData:
      properties:
        id:
          type: string
          title: Id
          description: A unique ID of the completion.
        choices:
          items:
            $ref: '#/components/schemas/StreamedCompletionsChoice'
          type: array
          title: Choices
        usage:
          anyOf:
            - $ref: '#/components/schemas/TextUsage'
            - type: 'null'
        object:
          type: string
          const: text_completion
          title: Object
          description: The object type, which is always set to `text_completion`.
        created:
          type: integer
          title: Created
          description: The Unix timestamp (in seconds) for when the token is sampled.
        model:
          anyOf:
            - type: string
            - type: 'null'
          title: Model
          description: The model to generate the completion. For dedicated endpoints,
            it returns the endpoint ID.
      type: object
      required:
        - id
        - choices
        - object
        - created
      title: StreamedCompletionData
    StreamedCompletionsChoice:
      properties:
        index:
          type: integer
          title: Index
          description: The index of the choice in the list of generated choices.
          examples:
            - 0
        text:
          type: string
          title: Text
          description: Generated text output.
          examples:
            - This is indeed a test
        logprobs:
          anyOf:
            - $ref: '#/components/schemas/CompletionsLogprobs'
            - type: 'null'
        finish_reason:
          anyOf:
            - type: string
              enum:
                - stop
                - length
                - 'null'
            - type: 'null'
          title: Finish Reason
          description: Termination condition of the generation. `stop` means the API
            returned the full completions generated by the model without running into
            any limits. `length` means the generation exceeded `max_tokens` or the
            conversation exceeded the max context length.
        token:
          anyOf:
            - type: integer
            - type: 'null'
          title: Token
          description: The token.
      type: object
      required:
        - index
        - text
      title: StreamedCompletionsChoice
    StreamedCompletionsResult:
      properties:
        data:
          $ref: '#/components/schemas/StreamedCompletionData'
      type: object
      required:
        - data
      title: StreamedCompletionsResult
    StreamedFunctionResult:
      properties:
        arguments:
          type: string
          title: Arguments
          description: 'The arguments for calling the function, generated by the model
            in JSON format.

            Ensure to validate these arguments in your code before invoking the function
            since the model may not always produce valid JSON.'
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
          description: The name of the function to call.
      type: object
      required:
        - arguments
      title: StreamedFunctionResult
    StreamedToolAssistedChatToken:
      properties:
        data:
          $ref: '#/components/schemas/StreamedChatData'
      type: object
      required:
        - data
      title: StreamedToolAssistedChatToken
    StreamedToolAssistedChatToolStatus:
      properties:
        event:
          type: string
          const: tool_status
          title: Event
        data:
          $ref: '#/components/schemas/ToolStatusData'
      type: object
      required:
        - event
        - data
      title: StreamedToolAssistedChatToolStatus
    StreamedToolCallResult:
      properties:
        type:
          type: string
          const: function
          title: Type
          description: The type of the tool.
        id:
          anyOf:
            - type: string
            - type: 'null'
          title: Id
          description: The ID of the tool call.
        index:
          type: integer
          title: Index
          description: The index of the tool call being generated.
        function:
          $ref: '#/components/schemas/StreamedFunctionResult'
      type: object
      required:
        - type
        - index
        - function
      title: StreamedToolCallResult
    SystemMessage:
      properties:
        role:
          type: string
          const: system
          title: Role
          description: The role of the messages author.
        content:
          type: string
          title: Content
          description: The content of system message.
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
          description: The name for the participant to distinguish between participants
            with the same role.
      type: object
      required:
        - role
        - content
      title: SystemMessage
    TextClassificationResult:
      properties:
        data:
          items:
            $ref: '#/components/schemas/BaseClassificationData'
          type: array
          title: Data
        object:
          type: string
          const: list
          title: Object
          description: The object type, which is always set to `list`.
        usage:
          $ref: '#/components/schemas/TextClassificationUsage'
      type: object
      required:
        - data
        - object
        - usage
      title: TextClassificationResult
    TextClassificationUsage:
      properties:
        prompt_tokens:
          type: integer
          title: Prompt Tokens
          description: Number of tokens in the input text.
          examples:
            - 10
        total_tokens:
          type: integer
          title: Total Tokens
          description: Total number of tokens used in the request.
          examples:
            - 10
      type: object
      required:
        - prompt_tokens
        - total_tokens
      title: TextClassificationUsage
    TextContent:
      properties:
        type:
          type: string
          const: text
          title: Type
          description: The type of the message content.
        text:
          type: string
          title: Text
          description: The text content of the message.
      type: object
      required:
        - type
        - text
      title: TextContent
    TextUsage:
      properties:
        prompt_tokens:
          type: integer
          title: Prompt Tokens
          description: Number of tokens in the prompt.
          examples:
            - 5
        completion_tokens:
          type: integer
          title: Completion Tokens
          description: Number of tokens in the generated completions.
          examples:
            - 7
        total_tokens:
          type: integer
          title: Total Tokens
          description: Total number of tokens used in the request (`prompt_tokens`
            + `completion_tokens`).
          examples:
            - 12
        prompt_tokens_details:
          anyOf:
            - $ref: '#/components/schemas/PromptTokensDetails'
            - type: 'null'
          description: Breakdown of tokens used in the prompt.
      type: object
      required:
        - prompt_tokens
        - completion_tokens
        - total_tokens
      title: TextUsage
    TokenSequence:
      properties:
        tokens:
          anyOf:
            - items:
                type: integer
              type: array
            - type: 'null'
          title: Tokens
          description: A List of token IDs.
      type: object
      title: TokenSequence
    Tool:
      properties:
        type:
          type: string
          const: function
          title: Type
          description: The type of the tool. Currently, only `function` is supported.
        function:
          $ref: '#/components/schemas/Function'
      type: object
      required:
        - type
        - function
      title: Tool
    ToolAssistedChatTool:
      oneOf:
        - $ref: '#/components/schemas/Tool'
          title: Function
        - $ref: '#/components/schemas/FriendliBuiltInTool'
          title: Friendli
        - $ref: '#/components/schemas/IntegratedBuiltInTool'
          title: Integrated
        - $ref: '#/components/schemas/FileBuiltInTool'
          title: File
      discriminator:
        propertyName: type
        mapping:
          code:python-interpreter: '#/components/schemas/FriendliBuiltInTool'
          file:text: '#/components/schemas/FileBuiltInTool'
          function: '#/components/schemas/Tool'
          linkup:search: '#/components/schemas/IntegratedBuiltInTool'
          math:calculator: '#/components/schemas/FriendliBuiltInTool'
          math:calendar: '#/components/schemas/FriendliBuiltInTool'
          math:statistics: '#/components/schemas/FriendliBuiltInTool'
          web:search: '#/components/schemas/FriendliBuiltInTool'
          web:url: '#/components/schemas/FriendliBuiltInTool'
    ToolCallResult:
      properties:
        type:
          type: string
          const: function
          title: Type
          description: The type of the tool.
        id:
          type: string
          title: Id
          description: The ID of the tool call.
        function:
          $ref: '#/components/schemas/FunctionResult'
      type: object
      required:
        - type
        - id
        - function
      title: ToolCallResult
    ToolMessage:
      properties:
        role:
          type: string
          const: tool
          title: Role
          description: The role of the messages author.
        content:
          type: string
          title: Content
          description: The content of tool message that contains the result of tool
            calling.
        tool_call_id:
          type: string
          title: Tool Call Id
          description: The ID of tool call corresponding to this message.
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
          description: An optional name of the tool call corresponding to this message.
      type: object
      required:
        - role
        - content
        - tool_call_id
      title: ToolMessage
    ToolStatusData:
      properties:
        tool_call_id:
          type: string
          title: Tool Call Id
          description: The ID of the tool call.
        name:
          type: string
          enum:
            - linkup:search
            - math:calculator
            - math:statistics
            - math:calendar
            - web:search
            - web:url
            - code:python-interpreter
            - file:text
          title: Name
          description: The name of the built-in tool.
        status:
          type: string
          enum:
            - STARTED
            - UPDATING
            - ENDED
            - ERRORED
          title: Status
          description: Indicates the current execution status of the tool.
        parameters:
          items:
            $ref: '#/components/schemas/ToolStatusParameter'
          type: array
          title: Parameters
        result:
          anyOf:
            - type: string
            - type: 'null'
          title: Result
          description: The output from the tool's execution.
        files:
          anyOf:
            - items:
                $ref: '#/components/schemas/ToolStatusFile'
              type: array
            - type: 'null'
          title: Files
        message:
          anyOf:
            - type: string
            - type: 'null'
          title: Message
          description: Message generated by the tool's execution.
        error:
          anyOf:
            - $ref: '#/components/schemas/ToolStatusError'
            - type: 'null'
        timestamp:
          type: number
          title: Timestamp
          description: The Unix timestamp (in seconds) for when the event occurred.
      type: object
      required:
        - tool_call_id
        - name
        - status
        - parameters
        - timestamp
      title: ToolStatusData
    ToolStatusError:
      properties:
        type:
          type: string
          title: Type
          description: The type of error encountered during the tool's execution.
        msg:
          type: string
          title: Msg
          description: The message of error.
      type: object
      required:
        - type
        - msg
      title: ToolStatusError
    ToolStatusFile:
      properties:
        name:
          type: string
          title: Name
          description: The name of the file generated by the tool's execution.
        url:
          type: string
          title: Url
          description: URL of the file generated by the tool's execution.
      type: object
      required:
        - name
        - url
      title: ToolStatusFile
    ToolStatusParameter:
      properties:
        name:
          type: string
          title: Name
          description: The name of the tool's function parameter.
        value:
          type: string
          title: Value
          description: The value of the tool's function parameter.
      type: object
      required:
        - name
        - value
      title: ToolStatusParameter
    UrlImageItem:
      properties:
        seed:
          type: integer
          title: Seed
          description: The seed used during image generation.
        response_format:
          type: string
          enum:
            - url
            - raw
            - png
            - jpeg
            - jpg
          title: Response Format
          description: The format of the generated image. One of `url(default)`, `raw`,
            `png`, `jpeg`, and `jpg`.
        url:
          type: string
          title: Url
          description: The URL of the generated image.
      type: object
      required:
        - seed
        - response_format
        - url
      title: UrlImageItem
    UserMessage:
      properties:
        role:
          type: string
          const: user
          title: Role
          description: The role of the message's author.
        content:
          anyOf:
            - type: string
              description: 'The content of user message, which is plain text.


                For **multi-modal format**, use `object[]` type. Support for non-text
                input is currently in **Beta**.'
            - items:
                $ref: '#/components/schemas/UserMessageContentMultiModal'
              type: array
              description: 'The content of user message.


                **Multi-modal format** can handle not just text, but also audio, image,
                and video content, allowing for more complex message structures. Support
                for non-text input is currently in **Beta**.'
          title: Content
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
          description: The name for the participant to distinguish between participants
            with the same role.
      type: object
      required:
        - role
        - content
      title: UserMessage
    UserMessageContentMultiModal:
      oneOf:
        - $ref: '#/components/schemas/TextContent'
          title: Text
        - $ref: '#/components/schemas/AudioContent'
          title: Audio
        - $ref: '#/components/schemas/ImageContent'
          title: Image
        - $ref: '#/components/schemas/VideoContent'
          title: Video
      discriminator:
        propertyName: type
        mapping:
          audio_url: '#/components/schemas/AudioContent'
          image_url: '#/components/schemas/ImageContent'
          text: '#/components/schemas/TextContent'
          video_url: '#/components/schemas/VideoContent'
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
        - loc
        - msg
        - type
      title: ValidationError
    VersionInfo:
      properties:
        id:
          type: string
          title: Id
          description: ID of the version.
        comment:
          type: string
          title: Comment
          description: Comment for the version.
        createdAt:
          type: integer
          title: Createdat
          description: Unix timestamp (in seconds) of when the version was created.
      type: object
      required:
        - id
        - comment
        - createdAt
      title: VersionInfo
      description: Version info.
    VideoContent:
      properties:
        type:
          type: string
          const: video_url
          title: Type
          description: The type of the message content.
        video_url:
          $ref: '#/components/schemas/VideoData'
          description: The video URL data.
      type: object
      required:
        - type
        - video_url
      title: VideoContent
    VideoData:
      properties:
        url:
          type: string
          title: Url
          description: The URL of the video.
      type: object
      required:
        - url
      title: VideoData
  securitySchemes:
    token:
      type: http
      description: 'When using Friendli Suite API for inference requests, you need
        to provide a **Friendli Token** for authentication and authorization purposes.


        For more detailed information, please refer [here](https://friendli.ai/docs/openapi/introduction#authentication).'
      scheme: bearer

