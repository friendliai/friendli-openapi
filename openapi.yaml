  /v1/messages:
    post:
      tags:
        - Container.Messages
      summary: Messages
      description: Generate responses using Anthropic Messages-style payloads.
      operationId: containerMessages
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContainerMessagesBody'
        required: true
      responses:
        '200':
          description: Successfully generated a Messages-style response. For streaming
            (`text/event-stream`) event and chunk details, see [Messages chunk object](/openapi/container/messages-chunk-object).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContainerMessagesSuccess'
              examples:
                Example:
                  value:
                    id: msg_4b71d12c86d94e719c7e3984a7bb7941
                    type: message
                    role: assistant
                    content:
                      - type: text
                        text: I can answer questions, generate text, and help with
                          coding tasks.
                    stop_reason: end_turn
                    usage:
                      input_tokens: 17
                      output_tokens: 14
                      cache_read_input_tokens: 0
                    model: zai-org/GLM-5.2
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessagesErrorResponse'
              examples:
                Invalid request error:
                  value:
                    type: error
                    error:
                      type: invalid_request_error
                      message: '...'
                    request_id: req_...
      x-speakeasy-name-override: messages
      x-mint:
        metadata:
          title: Container Messages
          sidebarTitle: Messages
          og:title: Container Messages
          description: Use the Anthropic Messages-style API with Friendli Container.
            Send structured message payloads to your self-hosted model and receive
            responses.
          og:description: Use the Anthropic Messages-style API with Friendli Container.
            Send structured message payloads to your self-hosted model and receive
            responses.
          tag: Beta
        href: /openapi/container/messages
        content: 'Send Anthropic Messages-style JSON.

          Detailed request/response field descriptions are provided in the OpenAPI
          schema below on this page.


          When streaming mode is used (i.e., `stream` option is set to `true`), the
          response is in MIME type `text/event-stream`. Otherwise, the content type
          is `application/json`.

          You can view the schema of the streamed sequence of chunk objects in streaming
          mode [here](/openapi/container/messages-chunk-object).


          <Warning>Server-side tools are not supported in the Messages API. In `tools`,
          only custom/client function tools are used; non-`custom` tool types are
          ignored.</Warning>


          <Info>

          This API is currently in **Beta**.

          While we strive to provide a stable and reliable experience, this feature
          is still under active development.

          As a result, you may encounter unexpected behavior or limitations.

          We encourage you to provide feedback to help us improve the feature before
          its official release.


          - [Feature request & feedback](mailto:support@friendli.ai)

          - [Contact support](mailto:support@friendli.ai)


          </Info>'
    servers:
      - url: http://localhost:8000
