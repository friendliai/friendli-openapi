        guidance_scale:
          anyOf:
            - type: number
            - type: 'null'
          title: Guidance Scale
          description: Adjusts the alignment of the generated image with the input
            prompt. Higher values (e.g., 8-10) make the output more faithful to the
            prompt, while lower values (e.g., 1-5) encourage more creative freedom.
            This parameter may be irrelevant for certain models, such as `FLUX.Schnell`.
