            - type: 'null'
        seed:
          anyOf:
            - items:
                type: integer
              type: array
            - type: integer
            - type: 'null'
          title: Seed
          description: Seed to control random procedure. If nothing is given, the
            API generate the seed randomly, use it for sampling, and return the seed
            along with the generated result. When using the `n` argument, you can
            pass a list of seed values to control all of the independent generations.
