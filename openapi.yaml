          title: Forced Output Tokens
          description: A token sequence that is enforced as a generation output. This
            option can be used when evaluating the model for the datasets with multi-choice
            problems (e.g., [HellaSwag](https://huggingface.co/datasets/hellaswag),
            [MMLU](https://huggingface.co/datasets/cais/mmlu)). Use this option with
            `logprobs` to get logprobs for the evaluation.
