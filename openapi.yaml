          anyOf:
            - items:
                $ref: '#/components/schemas/TokenSequence'
              type: array
            - type: 'null'
          title: Stop Tokens
          description: Stop generating further tokens when generated token corresponds
            to any of the tokens in the sequence.
        stream:
          type: boolean
          title: Stream
          description: Whether to stream the generation result. When set to `true`,
            each token will be sent as [server-sent events](https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events#event_stream_format)
            once generated.
