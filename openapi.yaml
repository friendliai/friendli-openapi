x-speakeasy-retries:
  strategy: backoff
  backoff:
    initialInterval: 500
    maxInterval: 60000
    maxElapsedTime: 3600000
    exponent: 1.5
  statusCodes:
    - 429
    - 500
    - 502
    - 503
    - 504
  retryConnectionErrors: true
