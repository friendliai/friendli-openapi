openapi: 3.1.0

info:
  title: Friendli Suite API Reference
  description: This is an OpenAPI reference of Friendli Suite API.
  termsOfService: https://friendli.ai/terms-of-service
  contact:
    name: FriendliAI Support Team
    email: support@friendli.ai
  version: 0.1.0

servers:
  - url: https://api.friendli.ai

paths:
  /v1/chat/completions:
    post:
      tags:
        - Container.Chat
      summary: Chat completions
      description: Given a list of messages forming a conversation, the model generates
        a response.
      operationId: containerChatComplete
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContainerChatCompletionBody'
        required: true
      responses:
        '200':
          description: Successfully generated a chat response.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContainerChatCompleteSuccess'
              examples:
                Example:
                  value:
                    id: chatcmpl-4b71d12c86d94e719c7e3984a7bb7941
                    object: chat.completion
                    choices:
                      - index: 0
                        message:
                          role: assistant
                          content: Hello there, how may I assist you today?
                        finish_reason: stop
                    usage:
                      prompt_tokens: 9
                      completion_tokens: 11
                      total_tokens: 20
                    created: 1735722153
        '422':
          description: Unprocessable Entity
      x-speakeasy-name-override: complete
      x-mint:
        metadata:
          title: Container Chat Completions
          sidebarTitle: Chat Completions
          og:title: Container Chat Completions
          description: Send a conversation to Friendli Container and receive a chat
            completion response. Supports streaming, tool calls, and custom model
            parameters.
          og:description: Send a conversation to Friendli Container and receive a
            chat completion response. Supports streaming, tool calls, and custom model
            parameters.
        href: /openapi/container/chat-completions
        content: 'Given a list of messages forming a conversation, the model generates
          a response.


          When streaming mode is used (i.e., `stream` option is set to `true`), the
          response is in MIME type `text/event-stream`. Otherwise, the content type
          is `application/json`.

          You can view the schema of the streamed sequence of chunk objects in streaming
          mode [here](/openapi/container/chat-completions-chunk-object).'
    servers:
      - url: http://localhost:8000
