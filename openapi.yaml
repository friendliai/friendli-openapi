    ServerlessToolAssistedChatCompletionBody:
      properties:
        model:
          type: string
          title: Model
          description: Code of the model to use. See [available model list](https://friendli.ai/docs/guides/model-apis/pricing#billing-methods).
          examples:
            - zai-org/GLM-5.2
        messages:
          items:
            $ref: '#/components/schemas/Message'
          type: array
          title: Messages
          description: A list of messages comprising the conversation so far.
          examples:
            - - content: You are a helpful assistant.
                role: system
              - content: Hello!
                role: user
        chat_template_kwargs:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Chat Template Kwargs
          description: Additional keyword arguments supplied to the template renderer.
            These parameters will be available for use within the chat template.
        eos_token:
          anyOf:
            - items:
                type: integer
              type: array
            - type: 'null'
          title: Eos Token
          description: A list of endpoint sentence tokens.
        frequency_penalty:
          anyOf:
            - type: number
            - type: 'null'
          title: Frequency Penalty
          description: Number between -2.0 and 2.0. Positive values penalizes tokens
            that have been sampled, taking into account their frequency in the preceding
            text. This penalization diminishes the model's tendency to reproduce identical
            lines verbatim.
        logit_bias:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Logit Bias
          description: Accepts a JSON object that maps tokens to an associated bias
            value. Mathematically, the bias is added to the logits generated by the
            model prior to sampling. The exact effect will vary per model.
        logprobs:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Logprobs
          description: Whether to return log probabilities of the output tokens or
            not.
        max_tokens:
          anyOf:
            - type: integer
            - type: 'null'
          title: Max Tokens
          description: The maximum number of tokens to generate. For decoder-only
            models like GPT, the length of your input tokens plus `max_tokens` should
            not exceed the model's maximum length (e.g., 2048 for OpenAI GPT-3). For
            encoder-decoder models like T5 or BlenderBot, `max_tokens` should not
            exceed the model's maximum output length. This is similar to Hugging Face's
            [`max_new_tokens`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.GenerationConfig.max_new_tokens)
            argument.
        min_p:
          anyOf:
            - type: number
            - type: 'null'
          title: Min P
          description: A scaling factor used to determine the minimum token probability
            threshold. This threshold is calculated as `min_p` multiplied by the probability
            of the most likely token. Tokens with probabilities below this scaled
            threshold are excluded from sampling. Values range from 0.0 (inclusive)
            to 1.0 (inclusive). Higher values result in stricter filtering, while
            lower values allow for greater diversity. The default value of 0.0 disables
            filtering, allowing all tokens to be considered for sampling.
        n:
          anyOf:
            - type: integer
            - type: 'null'
          title: N
          description: The number of independently generated results for the prompt.
            Defaults to 1. This is similar to Hugging Face's [`num_return_sequences`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.GenerationConfig.num_return_sequences)
            argument.
        parallel_tool_calls:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Parallel Tool Calls
          description: Whether to enable parallel function calling.
        presence_penalty:
          anyOf:
            - type: number
            - type: 'null'
          title: Presence Penalty
          description: Number between -2.0 and 2.0. Positive values penalizes tokens
            that have been sampled at least once in the existing text.
        repetition_penalty:
          anyOf:
            - type: number
            - type: 'null'
          title: Repetition Penalty
          description: Penalizes tokens that have already appeared in the generated
            result (plus the input tokens for decoder-only models). Should be positive
            value (1.0 means no penalty). See [keskar et al., 2019](https://arxiv.org/abs/1909.05858)
            for more details. This is similar to Hugging Face's [`repetition_penalty`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.generationconfig.repetition_penalty)
            argument.
        reasoning_effort:
          anyOf:
            - type: string
              enum:
                - low
                - medium
                - high
            - type: 'null'
          title: Reasoning Effort
          description: Determines the amount of reasoning effort the model applies
            when generating a response. Higher values may produce more detailed and
            thoughtful outputs, but can increase response time. This parameter is
            only effective for reasoning models.
        reasoning_budget:
          anyOf:
            - type: integer
            - type: 'null'
          title: Reasoning Budget
          description: Specifies a positive integer that defines a limit on the number
            of tokens used for internal reasoning tokens. This parameter is only effective
            for reasoning models.
        seed:
          anyOf:
            - items:
                type: integer
              type: array
            - type: integer
            - type: 'null'
          title: Seed
          description: Seed to control random procedure. If nothing is given, random
            seed is used for sampling, and return the seed along with the generated
            result. When using the `n` argument, you can pass a list of seed values
            to control all of the independent generations.
        stop:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          title: Stop
          description: When one of the stop phrases appears in the generation result,
            the API will stop generation. The stop phrases are excluded from the result.
            Defaults to empty list.
        stream:
          type: boolean
          title: Stream
          description: Whether to stream the generation result. When set to `true`,
            each token will be sent as [server-sent events](https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events#event_stream_format)
            once generated.
          default: false
        stream_options:
          anyOf:
            - $ref: '#/components/schemas/StreamOptions'
            - type: 'null'
          description: 'Options related to stream.

            It can only be used when `stream: true`.'
        parse_reasoning:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Parse Reasoning
          description: 'Parses model reasoning into `reasoning_content` while keeping
            the answer in `content`. Default value may vary between endpoints.


            For more detailed information, please refer [here](https://friendli.ai/docs/guides/reasoning#reasoning-parsing-with-friendli).'
        include_reasoning:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Include Reasoning
          description: 'When `parse_reasoning=true`, include parsed reasoning (`reasoning_content`).
            Defaults to true.


            For more detailed information, please refer [here](https://friendli.ai/docs/guides/reasoning#reasoning-parsing-with-friendli).'
        temperature:
          anyOf:
            - type: number
            - type: 'null'
          title: Temperature
          description: Sampling temperature. Smaller temperature makes the generation
            result closer to greedy, argmax (i.e., `top_k = 1`) sampling. Defaults
            to 1.0. This is similar to Hugging Face's [`temperature`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.generationconfig.temperature)
            argument.
        tool_choice:
          anyOf:
            - $ref: '#/components/schemas/ChatCompleteBodyToolChoice'
            - type: string
          title: Tool Choice
          description: 'Determines the tool calling behavior of the model.

            When set to `none`, the model will bypass tool execution and generate
            a response directly.

            In `auto` mode (the default), the model dynamically decides whether to
            call a tool or respond with a message.

            Alternatively, setting `required` ensures that the model invokes at least
            one tool before responding to the user.

            You can also specify a particular tool by `{"type": "function", "function":
            {"name": "my_function"}}`.

            '
        top_k:
          anyOf:
            - type: integer
            - type: 'null'
          title: Top K
          description: Limits sampling to the top k tokens with the highest probabilities.
            Values range from 0 (no filtering) to the model's vocabulary size (inclusive).
            The default value of 0 applies no filtering, allowing all tokens.
        top_logprobs:
          anyOf:
            - type: integer
            - type: 'null'
          title: Top Logprobs
          description: The number of most likely tokens to return at each token position,
            each with an associated log probability. `logprobs` must be set to true
            if this parameter is used.
        top_p:
          anyOf:
            - type: number
            - type: 'null'
          title: Top P
          description: Keeps only the smallest set of tokens whose cumulative probabilities
            reach `top_p` or higher. Values range from 0.0 (exclusive) to 1.0 (inclusive).
            The default value of 1.0 includes all tokens, allowing maximum diversity.
        xtc_threshold:
          anyOf:
            - type: number
            - type: 'null'
          title: Xtc Threshold
          description: "A probability threshold used to identify \u201Ctop choice\u201D\
            \ tokens for exclusion in XTC (Exclude Top Choices) sampling. Tokens with\
            \ probabilities at or above this threshold are considered viable candidates,\
            \ and all but the least likely viable token are excluded from sampling.\
            \ This option reduces the dominance of highly probable tokens while preserving\
            \ some diversity by keeping the least confident \u201Ctop choice.\u201D\
            \ Values range from 0.0 (inclusive) to 1.0 (inclusive). Higher values\
            \ make the filtering more selective by requiring higher probabilities\
            \ to trigger exclusion, while lower values apply filtering more broadly.\
            \ The default value of 0.0 disables XTC filtering entirely."
        xtc_probability:
          anyOf:
            - type: number
            - type: 'null'
          title: Xtc Probability
          description: The probability that XTC (Exclude Top Choices) filtering will
            be applied for each sampling decision. When XTC is triggered, high-probability
            tokens above the `xtc_threshold` are excluded except for the least likely
            viable token. This stochastic activation allows for a balance between
            standard sampling and creativity-boosting exclusion filtering. Values
            range from 0.0 (inclusive) to 1.0 (inclusive), where 0.0 means XTC is
            never applied, 1.0 means XTC is always applied when viable tokens exist,
            and intermediate values provide probabilistic activation. The default
            value of 0.0 disables XTC filtering.
        tools:
          anyOf:
            - items:
                $ref: '#/components/schemas/ToolAssistedChatTool'
              type: array
            - type: 'null'
          title: Tools
          description: 'A list of tools the model may call.

            A maximum of 128 functions is supported.

            Use this to provide a list of functions the model may generate JSON inputs
            for.

            For more detailed information about each tool, please refer [here](https://friendli.ai/docs/guides/model-apis/tool-assisted-api#built-in-tools).'
        resume_generation:
          type: boolean
          title: Resume Generation
          description: 'Enable to continue text generation even after an error occurs
            during a tool call.


            Note that enabling this option may use more tokens, as the system generates
            additional content to handle errors gracefully.

            However, if the system fails more than 8 times, the generation will stop
            regardless.


            ***Tip***

            This is useful in scenarios where you want to maintain text generation
            flow despite errors, such as when generating long-form content.

            The user will not be interrupted by tool call issues, ensuring a smoother
            experience.'
      type: object
      required:
        - model
        - messages
      title: ServerlessToolAssistedChatCompletionBody
      example:
        messages:
          - content: What is 3 + 6?
            role: user
        model: zai-org/GLM-5.2
        tools:
          - type: math:calculator
