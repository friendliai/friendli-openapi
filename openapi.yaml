          anyOf:
            - type: string
            - items:
                type: string
              type: array
          title: Prompt
          description: The prompt (i.e., input text) to generate completions for.
            Either `prompt` or `tokens` field is required.
          examples:
            - Say this is a test!
      type: object
      required:
        - model
        - prompt
      title: CompletionsStreamServerlessBodyWithPrompt
