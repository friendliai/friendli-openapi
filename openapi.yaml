            not be provided when `type=disabled` or `type=adaptive`. If `max_tokens`
            is set, this must be smaller than `max_tokens`.
      type: object
      required:
        - type
      title: MessagesThinkingConfig
    MessagesToolChoice:
      properties:
        type:
          type: string
          enum:
            - auto
            - any
            - tool
            - none
          title: Type
          description: Tool-calling mode. `auto` lets the model decide, `any` requires
            at least one tool call, `tool` forces a named tool, and `none` disables
            tool calls.
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
          description: Tool name to force when `type=tool`. Ignored for other `type`
            values.
        disable_parallel_tool_use:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Disable Parallel Tool Use
          description: If true, restricts the model to at most one tool call at a
            time. Must not be provided when `type=none`.
      type: object
      required:
        - type
      title: MessagesToolChoice
    MessagesToolDefinition:
      properties:
        name:
          type: string
          title: Name
          description: Tool identifier used in model tool-call outputs. Keep this
            name stable and unique within the request.
        type:
          anyOf:
            - type: string
            - type: 'null'
          title: Type
          description: Tool category. If missing, empty, or `custom`, it is converted
            to a function tool. Any non-empty value other than `custom` is treated
            as a server-side tool and skipped.
        description:
          anyOf:
            - type: string
            - type: 'null'
          title: Description
          description: Natural-language description of what the tool does and when
            to call it.
        input_schema:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Input Schema
          description: JSON Schema describing tool arguments. The model uses this
            schema to construct the tool input object.
        strict:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Strict
          description: If true, applies stricter schema adherence when generating
            tool arguments.
      type: object
      required:
        - name
      title: MessagesToolDefinition
    MessagesToolResultBlock:
      properties:
        type:
          type: string
          const: tool_result
          title: Type
          description: Content block type. Must be `tool_result`.
        tool_use_id:
          type: string
          title: Tool Use Id
          description: Identifier of the related `tool_use` block this result answers.
        content:
          anyOf:
            - type: string
            - items:
                additionalProperties: true
                type: object
              type: array
            - type: 'null'
          title: Content
          description: Tool result payload. Can be plain text, a list of objects,
            or null when no body is returned.
      type: object
      required:
        - type
        - tool_use_id
      title: MessagesToolResultBlock
    MessagesToolUseBlock:
      properties:
        type:
          type: string
          const: tool_use
          title: Type
          description: Content block type. Must be `tool_use`.
        id:
          anyOf:
            - type: string
            - type: 'null'
          title: Id
          description: Optional tool call identifier. Use this value to link follow-up
            `tool_result` blocks.
        name:
          type: string
          title: Name
          description: Name of the tool to invoke.
        input:
          additionalProperties: true
          type: object
          title: Input
          description: Tool input argument object.
      type: object
      required:
        - type
        - name
        - input
      title: MessagesToolUseBlock
    MessagesUrlImageSource:
      properties:
        type:
          type: string
          const: url
          title: Type
          description: Image source type. Must be `url`.
        url:
          type: string
          minLength: 1
          title: Url
          description: Publicly accessible image URL that the service can fetch.
      type: object
      required:
        - type
        - url
      title: MessagesUrlImageSource
    MessagesUsage:
      properties:
        input_tokens:
          type: integer
          minimum: 0.0
          title: Input Tokens
          description: Number of billed input tokens for this request.
        output_tokens:
          type: integer
          minimum: 0.0
          title: Output Tokens
          description: Number of billed output tokens generated by the model.
        cache_read_input_tokens:
          anyOf:
            - type: integer
              minimum: 0.0
            - type: 'null'
          title: Cache Read Input Tokens
          description: Number of input tokens served from cache, when cache reads
            are applicable.
      type: object
      required:
        - input_tokens
        - output_tokens
      title: MessagesUsage
    ModelCatalogResponseItem:
      properties:
        id:
          type: string
          title: Id
        name:
          type: string
          title: Name
        max_completion_tokens:
          type: integer
          title: Max Completion Tokens
        context_length:
          type: integer
          title: Context Length
        functionality:
          $ref: '#/components/schemas/Functionality'
          description: Model functionality
        pricing:
          $ref: '#/components/schemas/PricingModel'
          title: Pricing
          description: Token prices for input and output
        hugging_face_url:
          type: string
          minLength: 1
          format: uri
          title: Hugging Face Url
        description:
          type: string
          title: Description
        license:
          type: string
          minLength: 1
          format: uri
          title: License
        policy:
          anyOf:
            - type: string
              minLength: 1
              format: uri
            - type: 'null'
          title: Policy
        created:
          type: integer
          title: Created
        deprecation_date:
          anyOf:
            - type: string
            - type: 'null'
          title: Deprecation Date
          description: YYYY-MM-DD (UTC date)
      type: object
      required:
        - id
        - name
        - max_completion_tokens
        - context_length
        - functionality
        - pricing
        - hugging_face_url
        - description
        - license
        - created
      title: ModelCatalogResponseItem
      description: Model listing in `/models` API.
    PricingModel:
      properties:
        input:
          type: number
          minimum: 0.0
          title: Input
          description: Price per input token
        output:
          type: number
          minimum: 0.0
          title: Output
          description: Price per output token
        prompt:
          type: number
          minimum: 0.0
          title: Prompt
          description: Price per input token (alias of input)
        completion:
          type: number
          minimum: 0.0
          title: Completion
          description: Price per output token (alias of output)
        input_cache_read:
          anyOf:
            - type: number
              minimum: 0.0
            - type: 'null'
          title: Input Cache Read
          description: Price per cached input token read
        response_time:
          type: number
          minimum: 0.0
          title: Response Time
          description: Price per response time in seconds
          default: 0
        audio_minute:
          anyOf:
            - type: number
              minimum: 0.0
            - type: 'null'
          title: Audio Minute
          description: Price per audio minute
        unit_type:
          $ref: '#/components/schemas/ServerlessPriceUnitType'
          description: Pricing unit type (TOKEN / SECOND / AUDIO_MINUTE)
          default: TOKEN
      type: object
      required:
        - input
        - output
        - prompt
        - completion
      title: PricingModel
      description: Pricing model supporting both token-based and time-based pricing.
    PromptTokensDetails:
      properties:
        cached_tokens:
          anyOf:
            - type: integer
            - type: 'null'
          title: Cached Tokens
          description: Cached tokens present in the prompt.
      type: object
      title: PromptTokensDetails
    ResponseFormat:
      oneOf:
        - $ref: '#/components/schemas/ResponseFormatJsonSchema'
          title: Json Schema
        - $ref: '#/components/schemas/ResponseFormatJsonObject'
          title: Json Object
        - $ref: '#/components/schemas/ResponseFormatRegex'
          title: Regex
        - $ref: '#/components/schemas/ResponseFormatText'
          title: Text
      description: 'The enforced format of the model''s output.


        Note that the content of the output message may be truncated if it exceeds
        the `max_tokens`. You can check this by verifying that the `finish_reason`
        of the output message is `length`.


        For more detailed information, please refer [here](https://friendli.ai/docs/guides/structured-outputs).


        ***Important***

        You must explicitly instruct the model to produce the desired output format
        using a system prompt or user message (e.g., `You are an API generating a
        valid JSON as output.`).

        Otherwise, the model may result in an unending stream of whitespace or other
        characters.


        **When `response_format` is specified, `min_tokens` field is unsupported.**'
      discriminator:
        propertyName: type
        mapping:
          json_object: '#/components/schemas/ResponseFormatJsonObject'
          json_schema: '#/components/schemas/ResponseFormatJsonSchema'
          regex: '#/components/schemas/ResponseFormatRegex'
          text: '#/components/schemas/ResponseFormatText'
    ResponseFormatJsonObject:
      properties:
        type:
          type: string
          const: json_object
          title: Type
          description: 'The type of the response format: `json_object`'
      type: object
      required:
        - type
      title: ResponseFormatJsonObject
    ResponseFormatJsonSchema:
      properties:
        type:
          type: string
          const: json_schema
          title: Type
          description: 'The type of the response format: `json_schema`'
        json_schema:
          $ref: '#/components/schemas/ResponseFormatJsonSchemaSchema'
      type: object
      required:
        - type
        - json_schema
      title: ResponseFormatJsonSchema
    ResponseFormatJsonSchemaSchema:
      properties:
        schema:
          additionalProperties: true
          type: object
          title: Schema
          description: The schema for the response format, described as a JSON Schema
            object.
      type: object
      required:
        - schema
      title: ResponseFormatJsonSchemaSchema
    ResponseFormatRegex:
      properties:
        type:
          type: string
          const: regex
          title: Type
          description: 'The type of the response format: `regex`'
        schema:
          type: string
          title: Schema
          description: The schema of the output. Lookaheads or lookbehinds (e.g.,
            `\a`, `\z`, `^`, `$`, `(?=)`, `(?!)`, `(?<=...)`, `(?<!...)`) are not
            supported. Group specials (e.g., `\w`, `\W`, `\d`, `\D`, `\s`, `\S`) do
            not support non-ASCII characters. Unicode escape patterns (e.g., `\N`,
            `\p`, `\P`) are not supported. Additionally, conditional matching (`(?(`)
            and back-references can cause inefficiency.
      type: object
      required:
        - type
        - schema
      title: ResponseFormatRegex
    ResponseFormatText:
      properties:
        type:
          type: string
          const: text
          title: Type
          description: 'The type of the response format: `text`'
      type: object
      required:
        - type
      title: ResponseFormatText
    ServerVadChunkingStrategy:
      properties:
        type:
          type: string
          const: server_vad
          title: Type
          description: Must be set to `server_vad` to enable manual chunking using
            server side VAD.
        prefix_padding_ms:
          anyOf:
            - type: integer
            - type: 'null'
          title: Prefix Padding Ms
          description: Amount of audio to include before the VAD detected speech (in
            milliseconds).
          default: 300
        silence_duration_ms:
          anyOf:
            - type: integer
            - type: 'null'
          title: Silence Duration Ms
          description: Duration of silence to detect speech stop (in milliseconds).
            With shorter values the model will respond more quickly, but may jump
            in on short pauses from the user.
          default: 200
        threshold:
          anyOf:
            - type: number
            - type: 'null'
          title: Threshold
          description: Sensitivity threshold (0.0 to 1.0) for voice activity detection.
            A higher threshold will require louder audio to activate the model, and
            thus might perform better in noisy environments.
          default: 0.5
      type: object
      required:
        - type
      title: ServerVadChunkingStrategy
    ServerlessAudioTranscriptionBody:
      properties:
        model:
          type: string
          title: Model
          description: Code of the model to use. See [available model list](https://friendli.ai/docs/guides/model-apis/pricing#billing-methods).
          examples:
            - openai/whisper-large-v3
        file:
          type: string
          format: binary
          title: File
          description: 'The audio file object (not file name) to transcribe, in one
            of these formats: mp3, wav, flac, ogg, and many other standard audio formats.'
        chunking_strategy:
          anyOf:
            - type: string
              const: auto
            - $ref: '#/components/schemas/ServerVadChunkingStrategy'
            - type: 'null'
          title: Chunking Strategy
          description: Controls how the audio is cut into chunks. When set to `"auto"`,
            the server first normalizes loudness and then uses voice activity detection
            (VAD) to choose boundaries. `server_vad` object can be provided to tweak
            VAD detection parameters manually. If unset, the audio is transcribed
            as a single block.
        language:
          anyOf:
            - type: string
            - type: 'null'
          title: Language
          description: The language of the input audio. Supplying the input language
            in [ISO-639-1](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes)
            (e.g. `en`) format will improve accuracy and latency.
        stream:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Stream
          description: Whether to stream the transcription result. When set to `true`,
            the transcription result will be streamed as [server-sent events](https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events#event_stream_format)
            once generated.
        temperature:
          anyOf:
            - type: number
            - type: 'null'
          title: Temperature
          description: The sampling temperature, between 0 and 1. Higher values like
            0.8 will make the output more random, while lower values like 0.2 will
            make it more focused and deterministic.
      type: object
      required:
        - model
        - file
      title: ServerlessAudioTranscriptionBody
      example:
        file: '@/path/to/file/audio.mp3'
        model: openai/whisper-large-v3
    ServerlessAudioTranscriptionStreamBody:
      properties:
        model:
          type: string
          title: Model
          description: Code of the model to use. See [available model list](https://friendli.ai/docs/guides/model-apis/pricing#billing-methods).
          examples:
            - openai/whisper-large-v3
        file:
          type: string
          format: binary
          title: File
          description: 'The audio file object (not file name) to transcribe, in one
            of these formats: mp3, wav, flac, ogg, and many other standard audio formats.'
        chunking_strategy:
          anyOf:
            - type: string
              const: auto
            - $ref: '#/components/schemas/ServerVadChunkingStrategy'
            - type: 'null'
          title: Chunking Strategy
          description: Controls how the audio is cut into chunks. When set to `"auto"`,
            the server first normalizes loudness and then uses voice activity detection
            (VAD) to choose boundaries. `server_vad` object can be provided to tweak
            VAD detection parameters manually. If unset, the audio is transcribed
            as a single block.
        language:
          anyOf:
            - type: string
            - type: 'null'
          title: Language
          description: The language of the input audio. Supplying the input language
            in [ISO-639-1](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes)
            (e.g. `en`) format will improve accuracy and latency.
        stream:
          type: boolean
          title: Stream
          description: Whether to stream the transcription result. When set to `true`,
            the transcription result will be streamed as [server-sent events](https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events#event_stream_format)
            once generated.
          default: true
        temperature:
          anyOf:
            - type: number
            - type: 'null'
          title: Temperature
          description: The sampling temperature, between 0 and 1. Higher values like
            0.8 will make the output more random, while lower values like 0.2 will
            make it more focused and deterministic.
      type: object
      required:
        - model
        - file
      title: ServerlessAudioTranscriptionStreamBody
      example:
        file: '@/path/to/file/audio.mp3'
        model: openai/whisper-large-v3
    ServerlessAudioTranscriptionStreamSuccess:
      $ref: '#/components/schemas/StreamedAudioTranscriptionResult'
      title: ServerlessAudioTranscriptionStreamSuccess
    ServerlessAudioTranscriptionSuccess:
      $ref: '#/components/schemas/AudioTranscriptionResult'
      title: ServerlessAudioTranscriptionSuccess
    ServerlessChatCompleteSuccess:
      $ref: '#/components/schemas/ChatResult'
      title: ServerlessChatCompleteSuccess
    ServerlessChatCompletionBody:
      properties:
        model:
          type: string
          title: Model
          description: Code of the model to use. See [available model list](https://friendli.ai/docs/guides/model-apis/pricing#billing-methods).
          examples:
            - zai-org/GLM-5.2
        messages:
          items:
            $ref: '#/components/schemas/Message'
          type: array
          title: Messages
          description: A list of messages comprising the conversation so far.
          examples:
            - - content: You are a helpful assistant.
                role: system
              - content: Hello!
                role: user
        chat_template_kwargs:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Chat Template Kwargs
          description: Additional keyword arguments supplied to the template renderer.
            These parameters will be available for use within the chat template.
        eos_token:
          anyOf:
            - items:
                type: integer
              type: array
            - type: 'null'
          title: Eos Token
          description: A list of endpoint sentence tokens.
        frequency_penalty:
          anyOf:
            - type: number
            - type: 'null'
          title: Frequency Penalty
          description: Number between -2.0 and 2.0. Positive values penalizes tokens
            that have been sampled, taking into account their frequency in the preceding
            text. This penalization diminishes the model's tendency to reproduce identical
            lines verbatim.
        logit_bias:
          anyOf:
            - additionalProperties: true
              type: object
            - type: 'null'
          title: Logit Bias
          description: Accepts a JSON object that maps tokens to an associated bias
            value. Mathematically, the bias is added to the logits generated by the
            model prior to sampling. The exact effect will vary per model.
        logprobs:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Logprobs
          description: Whether to return log probabilities of the output tokens or
            not.
        max_tokens:
          anyOf:
            - type: integer
            - type: 'null'
          title: Max Tokens
          description: The maximum number of tokens to generate. For decoder-only
            models like GPT, the length of your input tokens plus `max_tokens` should
            not exceed the model's maximum length (e.g., 2048 for OpenAI GPT-3). For
            encoder-decoder models like T5 or BlenderBot, `max_tokens` should not
            exceed the model's maximum output length. This is similar to Hugging Face's
            [`max_new_tokens`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.GenerationConfig.max_new_tokens)
            argument.
        min_p:
          anyOf:
            - type: number
            - type: 'null'
          title: Min P
          description: A scaling factor used to determine the minimum token probability
            threshold. This threshold is calculated as `min_p` multiplied by the probability
            of the most likely token. Tokens with probabilities below this scaled
            threshold are excluded from sampling. Values range from 0.0 (inclusive)
            to 1.0 (inclusive). Higher values result in stricter filtering, while
            lower values allow for greater diversity. The default value of 0.0 disables
            filtering, allowing all tokens to be considered for sampling.
        n:
          anyOf:
            - type: integer
            - type: 'null'
          title: N
          description: The number of independently generated results for the prompt.
            Defaults to 1. This is similar to Hugging Face's [`num_return_sequences`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.GenerationConfig.num_return_sequences)
            argument.
        parallel_tool_calls:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Parallel Tool Calls
          description: Whether to enable parallel function calling.
        presence_penalty:
          anyOf:
            - type: number
            - type: 'null'
          title: Presence Penalty
          description: Number between -2.0 and 2.0. Positive values penalizes tokens
            that have been sampled at least once in the existing text.
        repetition_penalty:
          anyOf:
            - type: number
            - type: 'null'
          title: Repetition Penalty
          description: Penalizes tokens that have already appeared in the generated
            result (plus the input tokens for decoder-only models). Should be positive
            value (1.0 means no penalty). See [keskar et al., 2019](https://arxiv.org/abs/1909.05858)
            for more details. This is similar to Hugging Face's [`repetition_penalty`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.generationconfig.repetition_penalty)
            argument.
        reasoning_effort:
          anyOf:
            - type: string
              enum:
                - low
                - medium
                - high
            - type: 'null'
          title: Reasoning Effort
          description: Determines the amount of reasoning effort the model applies
            when generating a response. Higher values may produce more detailed and
            thoughtful outputs, but can increase response time. This parameter is
            only effective for reasoning models.
        reasoning_budget:
          anyOf:
            - type: integer
            - type: 'null'
          title: Reasoning Budget
          description: Specifies a positive integer that defines a limit on the number
            of tokens used for internal reasoning tokens. This parameter is only effective
            for reasoning models.
        seed:
          anyOf:
            - items:
                type: integer
              type: array
            - type: integer
            - type: 'null'
          title: Seed
          description: Seed to control random procedure. If nothing is given, random
            seed is used for sampling, and return the seed along with the generated
            result. When using the `n` argument, you can pass a list of seed values
            to control all of the independent generations.
        stop:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          title: Stop
          description: When one of the stop phrases appears in the generation result,
            the API will stop generation. The stop phrases are excluded from the result.
            Defaults to empty list.
        stream:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Stream
          description: Whether to stream the generation result. When set to `true`,
            each token will be sent as [server-sent events](https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events#event_stream_format)
            once generated.
          default: false
        stream_options:
          anyOf:
            - $ref: '#/components/schemas/StreamOptions'
            - type: 'null'
          description: 'Options related to stream.

            It can only be used when `stream: true`.'
        parse_reasoning:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Parse Reasoning
          description: 'Parses model reasoning into `reasoning_content` while keeping
            the answer in `content`. Default value may vary between endpoints.


            For more detailed information, please refer [here](https://friendli.ai/docs/guides/reasoning#reasoning-parsing-with-friendli).'
        include_reasoning:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Include Reasoning
          description: 'When `parse_reasoning=true`, include parsed reasoning (`reasoning_content`).
            Defaults to true.


            For more detailed information, please refer [here](https://friendli.ai/docs/guides/reasoning#reasoning-parsing-with-friendli).'
        temperature:
          anyOf:
            - type: number
            - type: 'null'
          title: Temperature
          description: Sampling temperature. Smaller temperature makes the generation
            result closer to greedy, argmax (i.e., `top_k = 1`) sampling. Defaults
            to 1.0. This is similar to Hugging Face's [`temperature`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.generationconfig.temperature)
            argument.
        tool_choice:
          anyOf:
            - $ref: '#/components/schemas/ChatCompleteBodyToolChoice'
            - type: string
          title: Tool Choice
          description: 'Determines the tool calling behavior of the model.

            When set to `none`, the model will bypass tool execution and generate
            a response directly.

            In `auto` mode (the default), the model dynamically decides whether to
            call a tool or respond with a message.

            Alternatively, setting `required` ensures that the model invokes at least
            one tool before responding to the user.

            You can also specify a particular tool by `{"type": "function", "function":
            {"name": "my_function"}}`.

            '
        top_k:
          anyOf:
            - type: integer
            - type: 'null'
          title: Top K
          description: Limits sampling to the top k tokens with the highest probabilities.
            Values range from 0 (no filtering) to the model's vocabulary size (inclusive).
            The default value of 0 applies no filtering, allowing all tokens.
        top_logprobs:
          anyOf:
            - type: integer
            - type: 'null'
          title: Top Logprobs
          description: The number of most likely tokens to return at each token position,
            each with an associated log probability. `logprobs` must be set to true
            if this parameter is used.
        top_p:
          anyOf:
            - type: number
            - type: 'null'
          title: Top P
          description: Keeps only the smallest set of tokens whose cumulative probabilities
            reach `top_p` or higher. Values range from 0.0 (exclusive) to 1.0 (inclusive).
            The default value of 1.0 includes all tokens, allowing maximum diversity.
        xtc_threshold:
          anyOf:
            - type: number
            - type: 'null'
          title: Xtc Threshold
          description: "A probability threshold used to identify \u201Ctop choice\u201D\
            \ tokens for exclusion in XTC (Exclude Top Choices) sampling. Tokens with\
            \ probabilities at or above this threshold are considered viable candidates,\
            \ and all but the least likely viable token are excluded from sampling.\
            \ This option reduces the dominance of highly probable tokens while preserving\
            \ some diversity by keeping the least confident \u201Ctop choice.\u201D\
            \ Values range from 0.0 (inclusive) to 1.0 (inclusive). Higher values\
            \ make the filtering more selective by requiring higher probabilities\
            \ to trigger exclusion, while lower values apply filtering more broadly.\
            \ The default value of 0.0 disables XTC filtering entirely."
        xtc_probability:
          anyOf:
            - type: number
            - type: 'null'
          title: Xtc Probability
          description: The probability that XTC (Exclude Top Choices) filtering will
            be applied for each sampling decision. When XTC is triggered, high-probability
            tokens above the `xtc_threshold` are excluded except for the least likely
            viable token. This stochastic activation allows for a balance between
            standard sampling and creativity-boosting exclusion filtering. Values
            range from 0.0 (inclusive) to 1.0 (inclusive), where 0.0 means XTC is
            never applied, 1.0 means XTC is always applied when viable tokens exist,
            and intermediate values provide probabilistic activation. The default
            value of 0.0 disables XTC filtering.
        tools:
          anyOf:
            - items:
                $ref: '#/components/schemas/Tool'
              type: array
            - type: 'null'
          title: Tools
          description: 'A list of tools the model may call.

            Use this to provide a list of functions the model may generate JSON inputs
            for.


            **When `tools` is specified, `min_tokens` and `response_format` fields
            are unsupported.**'
        min_tokens:
          anyOf:
            - type: integer
            - type: 'null'
          title: Min Tokens
          description: 'The minimum number of tokens to generate. Default value is
            0. This is similar to Hugging Face''s [`min_new_tokens`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.generationconfig.min_new_tokens)
            argument.


            **This field is unsupported when `tools` or `response_format` is specified.**'
        response_format:
          anyOf:
            - $ref: '#/components/schemas/ResponseFormat'
            - type: 'null'
          description: 'The enforced format of the model''s output.


            Note that the content of the output message may be truncated if it exceeds
            the `max_tokens`. You can check this by verifying that the `finish_reason`
            of the output message is `length`.


            For more detailed information, please refer [here](https://friendli.ai/docs/guides/structured-outputs).


            ***Important***

            You must explicitly instruct the model to produce the desired output format
            using a system prompt or user message (e.g., `You are an API generating
            a valid JSON as output.`).

            Otherwise, the model may result in an unending stream of whitespace or
            other characters.


            **This field is unsupported when `tools` is specified.**

            **When `response_format` is specified, `min_tokens` field is unsupported.**'
