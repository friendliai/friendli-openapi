        stop_tokens:
          anyOf:
            - items:
                $ref: '#/components/schemas/TokenSequence'
              type: array
            - type: 'null'
          title: Stop Tokens
          description: Stop generating further tokens when generated token corresponds
            to any of the tokens in the sequence.
