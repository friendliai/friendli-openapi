            type: string
            format: date-time
            description: RFC 3339 timestamp in UTC. The time portion must be zeroed
              out (e.g., 2026-01-02T00:00:00Z).
            title: End Time
          description: RFC 3339 timestamp in UTC. The time portion must be zeroed
            out (e.g., 2026-01-02T00:00:00Z).
        - name: limit
          in: query
          required: false
          schema:
            anyOf:
              - type: integer
                maximum: 35
                minimum: 1
              - type: 'null'
            description: A limit on the number of buckets to be returned. Limit can
              range between 1 and 35, and the default is 7.
            default: 7
            title: Limit
          description: A limit on the number of buckets to be returned. Limit can
            range between 1 and 35, and the default is 7.
        - name: page
          in: query
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            description: A cursor for use in pagination. Corresponding to the `next_page`
              field from the previous response.
            title: Page
          description: A cursor for use in pagination. Corresponding to the `next_page`
            field from the previous response.
        - name: group_by
          in: query
          required: false
          schema:
            anyOf:
              - $ref: '#/components/schemas/CostGroupBy'
              - type: 'null'
            description: Group the costs by the specified fields. Currently only `line_item`
              is supported.
            title: Group By
          description: Group the costs by the specified fields. Currently only `line_item`
            is supported.
        - name: X-Friendli-Team
          in: header
          required: false
          schema:
            anyOf:
              - type: string
              - type: 'null'
            description: ID of team to run requests as (optional parameter).
            title: X-Friendli-Team
          description: ID of team to run requests as (optional parameter).
      responses:
        '200':
          description: Team cost response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CostResponse'
        '429':
          description: Rate limit exceeded
        '422':
