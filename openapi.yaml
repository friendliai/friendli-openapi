    ContainerAudioTranscriptionBody:
      properties:
        model:
          anyOf:
            - type: string
            - type: 'null'
          title: Model
          description: Routes the request to a specific adapter.
          examples:
            - (adapter-route)
        file:
          type: string
          format: binary
          title: File
          description: 'The audio file object (not file name) to transcribe, in one
            of these formats: mp3, wav, flac, ogg, and many other standard audio formats.'
        chunking_strategy:
          anyOf:
            - type: string
              const: auto
            - $ref: '#/components/schemas/ServerVadChunkingStrategy'
            - type: 'null'
          title: Chunking Strategy
          description: Controls how the audio is cut into chunks. When set to `"auto"`,
            the server first normalizes loudness and then uses voice activity detection
            (VAD) to choose boundaries. `server_vad` object can be provided to tweak
            VAD detection parameters manually. If unset, the audio is transcribed
            as a single block.
        language:
          anyOf:
            - type: string
            - type: 'null'
          title: Language
          description: The language of the input audio. Supplying the input language
            in [ISO-639-1](https://en.wikipedia.org/wiki/List_of_ISO_639-1_codes)
            (e.g. `en`) format will improve accuracy and latency.
        stream:
          anyOf:
            - type: boolean
            - type: 'null'
          title: Stream
          description: Whether to stream the transcription result. When set to `true`,
            the transcription result will be streamed as [server-sent events](https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events#event_stream_format)
            once generated.
        temperature:
          anyOf:
            - type: number
            - type: 'null'
          title: Temperature
          description: The sampling temperature, between 0 and 1. Higher values like
            0.8 will make the output more random, while lower values like 0.2 will
            make it more focused and deterministic.
      type: object
      required:
        - file
      title: ContainerAudioTranscriptionBody
      example:
        file: '@/path/to/file/audio.mp3'
