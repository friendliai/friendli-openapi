        href: /openapi/administration/usage/cost
        content: 'Get cost details for the team.


          If `X-Friendli-Team` is omitted, this endpoint uses the default team configured
          in Friendli Suite.


          There may be a slight delay between usage and when it shows up in cost.
          If you need to call this endpoint repeatedly, wait at least 5 minutes between
          calls.


          To request successfully, it is mandatory to enter a **Personal API Key**
          (e.g. flp_XXX) value in the **Bearer Token** field.

          Refer to the [authentication section](/openapi/introduction#authentication)
