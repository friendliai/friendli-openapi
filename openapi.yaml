          here](https://friendli.ai/suite/~/setting/keys) to generate your API Key.'

components:
  schemas:
    AcceleratorRequirement:
      properties:
        type:
          type: string
          title: Type
          description: Specifies the instance type.
        count:
          type: integer
          title: Count
          description: Specifies the number of instances.
      type: object
      required:
        - type
        - count
      title: AcceleratorRequirement
      description: Accelerator requirement.
    AccountFileStatus:
      type: string
      enum:
        - UPLOADING
        - UPLOADED
        - FAILED
        - DELETED
      title: AccountFileStatus
      description: AccountFile status.
    AddSamplesResponse:
      properties:
        samples:
          items:
            prefixItems:
              - type: string
              - type: string
            type: array
            maxItems: 2
            minItems: 2
          type: array
          title: Samples
          description: List of sample IDs that were added to the dataset.
      type: object
      required:
        - samples
      title: AddSamplesResponse
      description: Add samples response.
    AssistantMessage:
      properties:
        role:
          type: string
          const: assistant
          title: Role
          description: The role of the messages author.
        content:
          anyOf:
            - type: string
            - type: 'null'
          title: Content
          description: The content of assistant message. Required unless `tool_calls`
            is specified.
        reasoning_content:
          anyOf:
            - type: string
            - type: 'null'
          title: Reasoning Content
          description: The intermediate reasoning content of assistant message.
        reasoning:
          anyOf:
            - type: string
            - type: 'null'
          title: Reasoning
          description: The intermediate reasoning content of assistant message. This
            field is a compatible option for the 'reasoning_content' field.
        name:
          anyOf:
            - type: string
            - type: 'null'
          title: Name
          description: The name for the participant to distinguish between participants
            with the same role.
        tool_calls:
          anyOf:
            - items:
                $ref: '#/components/schemas/AssistantMessageToolCall'
              type: array
            - type: 'null'
          title: Tool Calls
      type: object
      required:
        - role
      title: AssistantMessage
    AssistantMessageToolCall:
      properties:
        id:
          type: string
          title: Id
          description: The ID of tool call.
        type:
          type: string
          const: function
          title: Type
          description: The type of tool call.
        function:
          $ref: '#/components/schemas/AssistantMessageToolCallFunction'
          description: The function specification
      type: object
      required:
        - id
        - type
        - function
      title: AssistantMessageToolCall
    AssistantMessageToolCallFunction:
      properties:
        name:
          type: string
          title: Name
          description: The name of function
        arguments:
          type: string
          title: Arguments
          description: The arguments of function in JSON schema format to call the
            function.
      type: object
      required:
        - name
        - arguments
      title: AssistantMessageToolCallFunction
    AudioContent:
      properties:
        type:
          type: string
          const: audio_url
          title: Type
          description: The type of the message content.
        audio_url:
          $ref: '#/components/schemas/AudioData'
          description: The audio URL data.
      type: object
      required:
        - type
        - audio_url
      title: AudioContent
    AudioData:
      properties:
        url:
          type: string
          title: Url
          description: The URL of the audio.
      type: object
      required:
        - url
      title: AudioData
    AudioTranscriptionInputTokenDetails:
      properties:
        audio_tokens:
          type: integer
          title: Audio Tokens
          description: Number of audio tokens billed for this request.
        text_tokens:
          type: integer
          title: Text Tokens
          description: Number of text tokens billed for this request.
      type: object
      required:
        - audio_tokens
        - text_tokens
      title: AudioTranscriptionInputTokenDetails
    AudioTranscriptionResult:
      properties:
        text:
          type: string
          title: Text
          description: The transcribed text.
        usage:
          $ref: '#/components/schemas/AudioTranscriptionUsage'
      type: object
      required:
        - text
        - usage
      title: AudioTranscriptionResult
    AudioTranscriptionUsage:
      properties:
        type:
          type: string
          const: tokens
          title: Type
          description: The type of the usage object. Always `tokens` for this variant.
        input_tokens:
          type: integer
          title: Input Tokens
          description: Number of input tokens billed for this request.
        output_tokens:
          type: integer
          title: Output Tokens
          description: Number of output tokens generated.
        total_tokens:
          type: integer
          title: Total Tokens
          description: Total number of tokens used (input + output).
        input_audio_length_ms:
          type: integer
          title: Input Audio Length Ms
          description: The length of the input audio in milliseconds.
        processed_audio_length_ms:
          type: integer
          title: Processed Audio Length Ms
          description: The length of the processed audio in milliseconds.
        input_token_details:
          anyOf:
            - $ref: '#/components/schemas/AudioTranscriptionInputTokenDetails'
            - type: 'null'
          description: Details about the input tokens billed for this request.
      type: object
      required:
        - type
        - input_tokens
        - output_tokens
        - total_tokens
        - input_audio_length_ms
        - processed_audio_length_ms
      title: AudioTranscriptionUsage
    AutoscalingPolicy:
      properties:
        minReplica:
          type: integer
          minimum: 0.0
          title: Minimum Replica
          description: Setting `minReplica` to 0 allows the endpoint to sleep when
            idle, reducing costs. The minimum value is 0.
          default: 0
        maxReplica:
          type: integer
          maximum: 10.0
          title: Maximum Replica
          description: The maximum replicas that the endpoint can scale up to. The
            maximum value is 10.
          default: 1
        cooldownPeriod:
          type: integer
          title: Cooldown Period
          description: Determines how long the endpoint waits before scaling down
            after the last request.
          default: 300
      type: object
      title: AutoscalingPolicy
      description: Autoscaling policy.
    B64ImageItem:
      properties:
        seed:
          type: integer
          title: Seed
          description: The seed used during image generation.
        response_format:
          type: string
          enum:
            - url
            - raw
            - png
            - jpeg
            - jpg
          title: Response Format
          description: The format of the generated image. One of `url(default)`, `raw`,
            `png`, `jpeg`, and `jpg`.
        b64_json:
          type: string
          format: binary
          title: B64 Json
          description: The base64-encoded JSON of the generated image.
      type: object
      required:
        - seed
        - response_format
        - b64_json
      title: B64ImageItem
    BaseClassificationData:
      properties:
        index:
          type: integer
          title: Index
          description: The index of the input in the list of inputs.
          examples:
            - 0
        label:
          type: string
          title: Label
          description: The predicted label for the input text.
          examples:
            - Positive
        num_classes:
          type: integer
          title: Num Classes
          description: The number of possible labels the model can predict.
          examples:
            - 2
        probs:
          items:
            type: number
          type: array
          title: Probs
          description: A list of logits for each possible label.
          examples:
            - - 0.1
              - 0.9
      type: object
      required:
        - index
        - label
        - num_classes
        - probs
      title: BaseClassificationData
    Body_upload_raw_samples:
      properties:
        file:
          type: string
          format: binary
          title: File
          description: File to update samples.
      type: object
      required:
        - file
      title: Body_upload_raw_samples
    ChatChoice:
      properties:
        index:
          type: integer
          title: Index
          description: The index of the choice in the list of generated choices.
          examples:
            - 0
        logprobs:
          anyOf:
            - $ref: '#/components/schemas/ChatLogprobs'
            - type: 'null'
        message:
          $ref: '#/components/schemas/ChatChoiceMessage'
        finish_reason:
          type: string
          enum:
            - stop
            - length
            - tool_calls
          title: Finish Reason
          description: 'Termination condition of the generation. `stop` means the
            API returned the full chat completions generated by the model without
            running into any limits.

            `length` means the generation exceeded `max_tokens` or the conversation
            exceeded the max context length.

            `tool_calls` means the API has generated tool calls.'
      type: object
      required:
        - index
        - message
        - finish_reason
      title: ChatChoice
    ChatChoiceMessage:
      properties:
        content:
          anyOf:
            - type: string
            - type: 'null'
          title: Content
          description: The contents of the assistant message.
        role:
          type: string
          title: Role
          description: Role of the generated message author, in this case `assistant`.
        tool_calls:
          anyOf:
            - items:
                $ref: '#/components/schemas/ToolCallResult'
              type: array
            - type: 'null'
          title: Tool Calls
      type: object
      required:
        - role
      title: ChatChoiceMessage
    ChatCompleteBodyToolChoice:
      properties:
        type:
          type: string
          const: function
          title: Type
          description: The type of the tool. Currently, only `function` is supported.
        function:
          $ref: '#/components/schemas/ChatCompleteBodyToolChoiceFunction'
      type: object
      required:
        - type
        - function
      title: ChatCompleteBodyToolChoice
    ChatCompleteBodyToolChoiceFunction:
      properties:
        name:
          type: string
          title: Name
          description: The name of the function to be called. Must be a-z, A-Z, 0-9,
            or contain underscores and dashes, with a maximum length of 64.
      type: object
      required:
        - name
      title: ChatCompleteBodyToolChoiceFunction
    ChatLogprobs:
      properties:
        content:
          anyOf:
            - items:
                $ref: '#/components/schemas/ChatLogprobsContent'
              type: array
            - type: 'null'
          title: Content
          description: A list of message content tokens with log probability information.
      type: object
      title: ChatLogprobs
    ChatLogprobsContent:
      properties:
        token:
          type: string
          title: Token
          description: The token.
        logprob:
          type: number
          title: Logprob
          description: The log probability of this token.
        bytes:
          anyOf:
            - items:
                type: integer
              type: array
            - type: 'null'
          title: Bytes
          description: A list of integers representing the UTF-8 bytes representation
            of the token. Useful in instances where characters are represented by
            multiple tokens and their byte representations must be combined to generate
            the correct text representation. Can be `null` if there is no bytes representation
            for the token.
        top_logprobs:
          items:
            $ref: '#/components/schemas/ChatLogprobsContentTopLogprob'
          type: array
          title: Top Logprobs
          description: List of the most likely tokens and their log probability, at
            this token position.
      type: object
      required:
        - token
        - logprob
        - top_logprobs
      title: ChatLogprobsContent
    ChatLogprobsContentTopLogprob:
      properties:
        token:
          type: string
          title: Token
          description: The token.
        logprob:
          type: number
          title: Logprob
          description: The log probability of this token.
        bytes:
          anyOf:
            - items:
                type: integer
              type: array
            - type: 'null'
          title: Bytes
          description: A list of integers representing the UTF-8 bytes representation
            of the token. Useful in instances where characters are represented by
            multiple tokens and their byte representations must be combined to generate
            the correct text representation. Can be `null` if there is no bytes representation
            for the token.
      type: object
      required:
        - token
        - logprob
      title: ChatLogprobsContentTopLogprob
    ChatResult:
      properties:
        id:
          type: string
          title: Id
          description: A unique ID of the chat completion.
        choices:
          items:
            $ref: '#/components/schemas/ChatChoice'
          type: array
          title: Choices
        usage:
          $ref: '#/components/schemas/ChatUsage'
        object:
          type: string
          const: chat.completion
          title: Object
          description: The object type, which is always set to `chat.completion`.
        created:
          type: integer
          title: Created
          description: The Unix timestamp (in seconds) for when the generation completed.
        model:
          anyOf:
            - type: string
            - type: 'null'
          title: Model
          description: The model to generate the completion. For dedicated endpoints,
            it returns the endpoint ID.
      type: object
      required:
        - id
        - choices
        - usage
        - object
        - created
      title: ChatResult
    ChatUsage:
      properties:
        prompt_tokens:
          type: integer
          title: Prompt Tokens
          description: Number of tokens in the prompt.
          examples:
            - 5
        completion_tokens:
          type: integer
          title: Completion Tokens
          description: Number of tokens in the generated chat completions.
          examples:
            - 7
        total_tokens:
          type: integer
          title: Total Tokens
          description: Total number of tokens used in the request (`prompt_tokens`
            + `completion_tokens`).
          examples:
            - 12
        prompt_tokens_details:
          anyOf:
            - $ref: '#/components/schemas/PromptTokensDetails'
            - type: 'null'
          description: Breakdown of tokens used in the prompt.
      type: object
      required:
        - prompt_tokens
        - completion_tokens
        - total_tokens
      title: ChatUsage
    CompletionsBodyWithPrompt:
      properties:
        model:
          anyOf:
            - type: string
            - type: 'null'
          title: Model
          description: Routes the request to a specific adapter.
          examples:
            - (adapter-route)
        bad_word_tokens:
          anyOf:
            - items:
                $ref: '#/components/schemas/TokenSequence'
              type: array
            - type: 'null'
          title: Bad Word Tokens
          description: Same as the above `bad_words` field, but receives token sequences
            instead of text phrases. This is similar to Hugging Face's [`bad_word_ids`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.GenerationConfig.bad_words_ids)
            argument.
        bad_words:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          title: Bad Words
          description: 'Text phrases that should not be generated.

            For a bad word phrase that contains N tokens, if the first N-1 tokens
            appears at the last of the generated result, the logit for the last token
            of the phrase is set to -inf.

            Before checking whether a bard word is included in the result, the word
            is converted into tokens.

            We recommend using `bad_word_tokens` because it is clearer.

            For example, after tokenization, phrases "clear" and " clear" can result
            in different token sequences due to the prepended space character.

            Defaults to empty list.

            '
        embedding_to_replace:
          anyOf:
            - items:
                type: number
              type: array
            - type: 'null'
          title: Embedding To Replace
          description: A list of flattened embedding vectors used for replacing the
            tokens at the specified indices provided via `token_index_to_replace`.
        encoder_no_repeat_ngram:
          anyOf:
            - type: integer
            - type: 'null'
          title: Encoder No Repeat Ngram
          description: If this exceeds 1, every ngram of that size occurring in the
            input token sequence cannot appear in the generated result. 1 means that
            this mechanism is disabled (i.e., you cannot prevent 1-gram from being
            generated repeatedly). Only allowed for encoder-decoder models. Defaults
            to 1. This is similar to Hugging Face's [`encoder_no_repeat_ngram_size`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.GenerationConfig.encoder_no_repeat_ngram_size)
            argument.
        encoder_repetition_penalty:
          anyOf:
            - type: number
            - type: 'null'
          title: Encoder Repetition Penalty
          description: Penalizes tokens that have already appeared in the input tokens.
            Should be positive value. 1.0 means no penalty. Only allowed for encoder-decoder
            models. See [Keskar et al., 2019](https://arxiv.org/abs/1909.05858) for
            more details. This is similar to Hugging Face's [`encoder_repetition_penalty`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.GenerationConfig.encoder_repetition_penalty)
            argument.
        eos_token:
          anyOf:
            - items:
                type: integer
              type: array
            - type: 'null'
          title: Eos Token
          description: A list of endpoint sentence tokens.
        forced_output_tokens:
          anyOf:
            - items:
                type: integer
              type: array
            - type: 'null'
          title: Forced Output Tokens
          description: A token sequence that is enforced as a generation output. This
            option can be used when evaluating the model for the datasets with multi-choice
            problems (e.g., [HellaSwag](https://huggingface.co/datasets/hellaswag),
            [MMLU](https://huggingface.co/datasets/cais/mmlu)). Use this option with
            `logprobs` to get logprobs for the evaluation.
        frequency_penalty:
          anyOf:
            - type: number
            - type: 'null'
          title: Frequency Penalty
          description: Number between -2.0 and 2.0. Positive values penalizes tokens
            that have been sampled, taking into account their frequency in the preceding
            text. This penalization diminishes the model's tendency to reproduce identical
            lines verbatim.
        logprobs:
          anyOf:
            - type: integer
            - type: 'null'
          title: Logprobs
          description: Include the log probabilities on the logprobs most likely output
            tokens, as well the chosen tokens.
        max_tokens:
          anyOf:
            - type: integer
            - type: 'null'
          title: Max Tokens
          description: The maximum number of tokens to generate. For decoder-only
            models like GPT, the length of your input tokens plus `max_tokens` should
            not exceed the model's maximum length (e.g., 2048 for OpenAI GPT-3). For
            encoder-decoder models like T5 or BlenderBot, `max_tokens` should not
            exceed the model's maximum output length. This is similar to Hugging Face's
            [`max_new_tokens`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.GenerationConfig.max_new_tokens)
            argument.
        max_total_tokens:
          anyOf:
            - type: integer
            - type: 'null'
          title: Max Total Tokens
          description: The maximum number of tokens including both the generated result
            and the input tokens. Only allowed for decoder-only models. Only one argument
            between `max_tokens` and `max_total_tokens` is allowed. Default value
            is the model's maximum length. This is similar to Hugging Face's [`max_length`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.GenerationConfig.max_length)
            argument.
        min_p:
          anyOf:
            - type: number
            - type: 'null'
          title: Min P
          description: A scaling factor used to determine the minimum token probability
            threshold. This threshold is calculated as `min_p` multiplied by the probability
            of the most likely token. Tokens with probabilities below this scaled
            threshold are excluded from sampling. Values range from 0.0 (inclusive)
            to 1.0 (inclusive). Higher values result in stricter filtering, while
            lower values allow for greater diversity. The default value of 0.0 disables
            filtering, allowing all tokens to be considered for sampling.
        min_tokens:
          anyOf:
            - type: integer
            - type: 'null'
          title: Min Tokens
          description: 'The minimum number of tokens to generate. Default value is
            0. This is similar to Hugging Face''s [`min_new_tokens`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.generationconfig.min_new_tokens)
            argument.


            **This field is unsupported when `response_format` is specified.**'
        min_total_tokens:
          anyOf:
            - type: integer
            - type: 'null'
          title: Min Total Tokens
          description: The minimum number of tokens including both the generated result
            and the input tokens. Only allowed for decoder-only models. Only one argument
            between `min_tokens` and `min_total_tokens` is allowed. This is similar
            to Hugging Face's [`min_length`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.GenerationConfig.min_length)
            argument.
        n:
          anyOf:
            - type: integer
            - type: 'null'
          title: N
          description: The number of independently generated results for the prompt.
            Defaults to 1. This is similar to Hugging Face's [`num_return_sequences`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.GenerationConfig.num_return_sequences)
            argument.
        no_repeat_ngram:
          anyOf:
            - type: integer
            - type: 'null'
          title: No Repeat Ngram
          description: If this exceeds 1, every ngram of that size can only occur
            once among the generated result (plus the input tokens for decoder-only
            models). 1 means that this mechanism is disabled (i.e., you cannot prevent
            1-gram from being generated repeatedly). Defaults to 1. This is similar
            to Hugging Face's [`no_repeat_ngram_size`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.GenerationConfig.no_repeat_ngram_size)
            argument.
        presence_penalty:
          anyOf:
            - type: number
            - type: 'null'
          title: Presence Penalty
          description: Number between -2.0 and 2.0. Positive values penalizes tokens
            that have been sampled at least once in the existing text.
        repetition_penalty:
          anyOf:
            - type: number
            - type: 'null'
          title: Repetition Penalty
          description: Penalizes tokens that have already appeared in the generated
            result (plus the input tokens for decoder-only models). Should be positive
            value (1.0 means no penalty). See [keskar et al., 2019](https://arxiv.org/abs/1909.05858)
            for more details. This is similar to Hugging Face's [`repetition_penalty`](https://huggingface.co/docs/transformers/v4.26.0/en/main_classes/text_generation#transformers.generationconfig.repetition_penalty)
            argument.
        response_format:
          anyOf:
            - $ref: '#/components/schemas/ResponseFormat'
            - type: 'null'
        seed:
          anyOf:
            - items:
                type: integer
              type: array
            - type: integer
            - type: 'null'
          title: Seed
          description: Seed to control random procedure. If nothing is given, the
            API generate the seed randomly, use it for sampling, and return the seed
            along with the generated result. When using the `n` argument, you can
            pass a list of seed values to control all of the independent generations.
        stop:
          anyOf:
            - items:
                type: string
              type: array
            - type: 'null'
          title: Stop
          description: 'When one of the stop phrases appears in the generation result,
            the API will stop generation.

            The stop phrases are excluded from the result.

            Defaults to empty list.'
        stop_tokens:
          anyOf:
            - items:
                $ref: '#/components/schemas/TokenSequence'
